<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolidStore Demo</title>
    <link rel="icon" href="data:,">
    <style>
      * { box-sizing: border-box; }
      :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; background: #090b12; color: #e8eaf2; }
      body { margin: 0; min-width: 320px; background: #090b12; }
      button, input, select { font: inherit; }
      button { cursor: pointer; }
      .app-shell { min-height: 100vh; }
      .app-header { position: sticky; top: 0; z-index: 30; display: flex; align-items: center; gap: 32px; min-height: 64px; padding: 0 28px; border-bottom: 1px solid #292d3b; background: rgb(12 14 22 / 94%); backdrop-filter: blur(14px); }
      .brand { border: 0; background: transparent; color: #f5f6fb; font-size: 18px; font-weight: 750; }
      nav { display: flex; align-self: stretch; gap: 8px; }
      nav button { min-width: 80px; border: 0; border-bottom: 2px solid transparent; background: transparent; color: #9ea3b7; }
      nav button:hover, nav button.active { border-bottom-color: #6d7cff; color: #fff; }
      .page { min-height: calc(100vh - 64px); padding: 28px; background: #090b12; }
      .page-heading { display: flex; align-items: end; justify-content: space-between; gap: 20px; max-width: 1440px; margin: 0 auto 24px; }
      .eyebrow { color: #7f8cff; font: 700 11px/1.2 ui-monospace, monospace; }
      h1 { margin: 8px 0 0; font-size: 26px; letter-spacing: 0; }
      h2 { margin: 0; font-size: 15px; letter-spacing: 0; }
      .store-stats { display: flex; gap: 18px; color: #9298aa; font-size: 12px; }
      .store-stats strong { color: #e8eaf2; font-variant-numeric: tabular-nums; }
      .toolbar { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; max-width: 1440px; min-height: 54px; margin: 0 auto 14px; padding: 9px 12px; border: 1px solid #292d3b; background: #11131c; font-size: 12px; }
      .toolbar label { display: flex; align-items: center; gap: 7px; color: #aeb3c5; }
      .toolbar button, .toolbar select { min-height: 32px; border: 1px solid #363b4d; border-radius: 4px; padding: 0 10px; background: #171a25; color: #e8eaf2; }
      .toolbar code { margin-left: auto; color: #7f8cff; }
      .toggle input { accent-color: #6d7cff; }
      .board-layout { display: grid; grid-template-columns: minmax(0, 1fr) 260px; gap: 14px; max-width: 1440px; margin: 0 auto; }
      .board { display: grid; grid-template-columns: repeat(16, minmax(36px, 1fr)); gap: 4px; min-height: 0; overflow: auto; padding: 10px; border: 1px solid #292d3b; background: #0d0f17; }
      .board-cell { display: grid; place-items: center; gap: 2px; width: 100%; aspect-ratio: 1; min-width: 36px; border: 1px solid #8c94aa; border-radius: 4px; color: #111522; user-select: none; }
      .board-cell strong { font-size: 13px; }
      .board-cell span { font-size: 8px; color: #4d5568; }
      .event-log { padding: 16px; border: 1px solid #292d3b; background: #11131c; }
      .event-log h2 { margin-bottom: 12px; }
      .event-log code { display: block; overflow-wrap: anywhere; padding: 6px 0; border-bottom: 1px solid #242836; color: #9da4b7; font-size: 10px; }
      .event-log p { color: #777e92; font-size: 12px; }
      .user-row { display: flex; justify-content: space-between; min-height: 34px; border-bottom: 1px solid #242836; color: #aeb3c5; font-size: 12px; }
      .design-workspace { display: grid; grid-template-columns: minmax(0, 1fr) 300px; min-height: 660px; max-width: 1440px; margin: 0 auto; border: 1px solid #292d3b; background: #0d0f17; }
      .preview-stage { display: grid; place-items: center; min-width: 0; overflow: auto; padding: 32px; background-color: #0b0d14; background-image: linear-gradient(#1b1e2a 1px, transparent 1px), linear-gradient(90deg, #1b1e2a 1px, transparent 1px); background-size: 28px 28px; }
      .ai-component { width: min(var(--panel-width), 100%); height: var(--panel-height); padding: var(--panel-padding); border: 1px solid color-mix(in srgb, var(--panel-accent) 48%, #303548); border-radius: var(--panel-radius); background: var(--panel-surface); box-shadow: 0 24px 70px rgb(0 0 0 / 35%); }
      .component-topline { display: flex; align-items: center; gap: 8px; color: #9ca2b6; font: 600 11px/1 ui-monospace, monospace; }
      .component-topline i, .dashboard-heading i { width: 7px; height: 7px; border-radius: 50%; background: #35c878; }
      .component-topline b { margin-left: auto; color: var(--panel-accent); }
      .ai-component h2 { margin: 54px 0 12px; font-size: 30px; }
      .ai-component p { color: #a5aabd; line-height: 1.6; }
      .prompt { display: flex; align-items: center; gap: 12px; margin-top: 32px; padding: 8px 8px 8px 14px; border: 1px solid #363b4d; background: #0d0f16; color: #aeb3c5; }
      .prompt span { flex: 1; }
      .prompt button { min-height: 34px; border: 0; padding: 0 14px; background: var(--panel-accent); color: #fff; }
      .tokens { display: flex; gap: 8px; margin-top: 14px; color: #858b9e; font-size: 11px; }
      .tokens span { padding: 5px 7px; border: 1px solid #303443; }
      .controls { border-left: 1px solid #292d3b; padding: 20px; background: #11131c; }
      .control-heading { display: flex; justify-content: space-between; margin-bottom: 26px; }
      .control-heading code { color: #7f8cff; font-size: 10px; }
      .controls > label { display: block; margin-bottom: 22px; }
      .controls label span { display: flex; justify-content: space-between; margin-bottom: 9px; color: #aeb3c5; font-size: 12px; }
      .controls input[type='range'], .controls input[type='text'] { width: 100%; }
      .controls input[type='range'] { accent-color: #6d7cff; }
      .controls input[type='text'] { min-height: 36px; border: 1px solid #363b4d; padding: 0 10px; background: #0d0f16; color: #eef0f7; }
      .color-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .color-controls input { width: 100%; height: 38px; border: 1px solid #363b4d; background: transparent; }
      .dashboard-heading p { display: flex; align-items: center; gap: 8px; color: #9fa5b7; font-size: 13px; }
      .metrics { display: grid; grid-template-columns: repeat(4, 1fr); max-width: 1440px; margin: 0 auto 18px; border: 1px solid #292d3b; background: #11131c; }
      .metrics article { display: grid; gap: 9px; padding: 20px; border-right: 1px solid #292d3b; }
      .metrics article:last-child { border-right: 0; }
      .metrics span, .metrics small { color: #9298aa; font-size: 12px; }
      .metrics strong { font-size: 25px; }
      .dashboard-grid { display: grid; grid-template-columns: 1.15fr .85fr; gap: 18px; max-width: 1440px; margin: 0 auto; }
      .dashboard-grid > section { min-height: 390px; border: 1px solid #292d3b; background: #11131c; }
      .dashboard-grid section > header { display: flex; justify-content: space-between; padding: 17px 18px; border-bottom: 1px solid #292d3b; }
      .dashboard-grid header span { color: #858b9e; font-size: 11px; }
      .bars { display: flex; align-items: end; gap: 7px; height: 320px; padding: 24px; }
      .bars i { flex: 1; min-width: 8px; background: #6d7cff; transition: height 180ms ease; }
      .service-row { display: grid; grid-template-columns: 1.5fr .8fr .6fr .7fr; gap: 12px; align-items: center; min-height: 54px; margin: 0 18px; border-bottom: 1px solid #252936; font-size: 12px; }
      .service-row span { color: #adb2c3; }
      .service-row.head { min-height: 38px; color: #777e92; text-transform: uppercase; font-size: 10px; }
      .healthy { color: #35c878 !important; }
      @media (max-width: 900px) { .board-layout, .design-workspace, .dashboard-grid { grid-template-columns: 1fr; } .controls { border-left: 0; border-top: 1px solid #292d3b; } .metrics { grid-template-columns: 1fr 1fr; } .event-log { min-height: 220px; } }
      @media (max-width: 620px) { .app-header { align-items: flex-start; flex-direction: column; gap: 4px; padding: 12px 16px 0; } nav { width: 100%; min-height: 44px; overflow-x: auto; } .page { padding: 18px; } .page-heading { align-items: flex-start; flex-direction: column; } .toolbar code { width: 100%; margin-left: 0; overflow-wrap: anywhere; } .metrics { grid-template-columns: 1fr; } .service-row { min-width: 500px; } .services { overflow-x: auto; } }
    </style>
  </head>
  <body><div id="root"></div><script type="module" src="/src/index.tsx"></script></body>
</html>
